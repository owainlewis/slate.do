name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test ./...
        working-directory: cli
      - run: sh scripts/test-install.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Build release archives
        run: sh scripts/build-cli-release.sh "$GITHUB_REF_NAME" dist
      - name: Create checksums
        run: cd dist && sha256sum *.tar.gz > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "Slate CLI $GITHUB_REF_NAME"
