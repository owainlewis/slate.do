name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: |
            server/go.mod
            cli/go.mod
      - run: go test ./...
        working-directory: server
      - run: go test ./...
        working-directory: cli
      - run: sh -n install.sh scripts/build-cli-release.sh scripts/test-install.sh scripts/gcp-deploy.sh scripts/test-cloudbuild.sh
      - run: sh scripts/test-cloudbuild.sh
      - run: sh scripts/test-install.sh
      - run: sh scripts/build-cli-release.sh v0.0.0 "$RUNNER_TEMP/slate-release"
